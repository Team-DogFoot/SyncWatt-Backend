name: SyncWatt CI/CD (prod)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".env.example"
      - ".vscode/**"
      - "docs/**"
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".env.example"
      - ".vscode/**"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/team-dogfoot/syncwatt-backend
  MANIFEST_REPO_URL: https://github.com/Team-DogFoot/dog-foot-k8s-manifests.git
  MANIFEST_REPO_PATH: prod/syncwatt

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff  # 린트 및 테스트 도구 설치

      - name: Lint with ruff
        run: ruff check .

      # - name: Run tests
      #   run: pytest  # 나중에 테스트 코드 추가 시 활성화

  build-and-push-ghcr:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [quality]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.set_tag.outputs.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: set_tag
        run: |
          TAG="prod-${{ github.sha }}"
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  update-manifests:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build-and-push-ghcr

    steps:
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.4.3
          sudo mv kustomize /usr/local/bin/

      - name: Checkout manifests repository
        uses: actions/checkout@v4
        with:
          repository: Team-DogFoot/dog-foot-k8s-manifests
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          ref: main

      - name: Update syncwatt kustomize image tag
        env:
          IMAGE_TAG: ${{ needs.build-and-push-ghcr.outputs.image_tag }}
        run: |
          cd ${{ env.MANIFEST_REPO_PATH }}
          kustomize edit set image "${IMAGE_NAME}=${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore(syncwatt): deploy ${{ needs.build-and-push-ghcr.outputs.image_tag }}" || echo "No changes"
          git pull --rebase origin main
          git push
