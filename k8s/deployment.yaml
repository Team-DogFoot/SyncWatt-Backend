apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncwatt-backend
  namespace: syncwatt-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: syncwatt-backend
  template:
    metadata:
      labels:
        app: syncwatt-backend
    spec:
      containers:
      - name: syncwatt-backend
        image: ghcr.io/team-dogfoot/syncwatt-backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: syncwatt-secret
