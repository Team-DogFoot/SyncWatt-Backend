apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncwatt-backend
  namespace: syncwatt-prod
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: syncwatt-backend
  template:
    metadata:
      labels:
        app: syncwatt-backend
    spec:
      containers:
      - name: syncwatt-backend
        image: ghcr.io/team-dogfoot/syncwatt-backend:latest
        ports:
        - containerPort: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - secretRef:
            name: syncwatt-secret
